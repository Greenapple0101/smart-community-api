<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>
    <h1>회원가입</h1>
    <form th:action="@{/users/register}" th:object="${user}" method="post">
        <div>
            <label>이메일:</label>
            <input type="email" th:field="*{email}" placeholder="이메일" required />
        </div>
        <div>
            <label>사용자명:</label>
            <input type="text" th:field="*{username}" placeholder="사용자명을 입력하세요" required />
        </div>
        <div>
            <label>비밀번호:</label>
            <input type="password" th:field="*{password}" placeholder="비밀번호" required />
        </div>
        <div>
            <button type="submit">가입하기</button>
        </div>
        <div th:if="${error}">
            <p style="color:red;" th:text="${error}"></p>
        </div>
    </form>
</body>
</html>
